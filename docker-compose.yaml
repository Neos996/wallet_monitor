services:
  wallet_monitor:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    command:
      - "-listen"
      - ":8080"
      - "-db"
      - "/data/wallets.db"
      - "-scan-interval"
      - "30s"
      - "-scan-workers"
      - "${SCAN_WORKERS:-4}"
      - "-rpc-url"
      - "https://api.trongrid.io"
      - "-tron-api-key"
      - "${TRON_API_KEY:-}"
      - "-tron-qps"
      - "${TRON_QPS:-8}"
      - "-tron-retry-429"
      - "${TRON_RETRY_429:-3}"
      - "-evm-rpc-url"
      - "${EVM_RPC_URL:-}"
      - "-evm-log-range"
      - "${EVM_LOG_RANGE:-2000}"
      - "-evm-scan-mode"
      - "${EVM_SCAN_MODE:-address}"
      - "-evm-topic-batch"
      - "${EVM_TOPIC_BATCH:-100}"
      - "-callback-url"
      - "${CALLBACK_URL:-}"
      - "-callback-batch"
      - "${CALLBACK_BATCH:-100}"
      - "-callback-workers"
      - "${CALLBACK_WORKERS:-4}"
      - "-callback-qps"
      - "${CALLBACK_QPS:-0}"
      - "-callback-retry-4xx"
      - "${CALLBACK_RETRY_4XX:-false}"
      - "-callback-retry-statuses"
      - "${CALLBACK_RETRY_STATUSES:-}"
      - "-admin-token"
      - "${ADMIN_TOKEN:-}"
      - "-callback-secret"
      - "${CALLBACK_SECRET:-}"
